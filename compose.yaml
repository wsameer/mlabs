services:
  app:
    profiles: ["full-stack"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlabs_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3001
      DATABASE_URL: /data/mlabs.db
    ports:
      - "3001:3001"
    volumes:
      - mlabs_data:/data

volumes:
  mlabs_data:
