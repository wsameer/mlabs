services:
  app:
    profiles: ["full-stack"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlabs_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: /data/mlabs.db
      WEB_DIST_PATH: /app/apps/web/dist
    ports:
      - "3001:3001"
    volumes:
      - mlabs_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  mlabs_data:
