services:
  app:
    profiles: ["full-stack"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlabs_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: /data/mlabs.db
      WEB_DIST_PATH: /app/apps/web/dist
    ports:
      - "3001:3001"
    volumes:
      - mlabs_data:/data

volumes:
  mlabs_data:
